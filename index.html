<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Absensi</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
  }
  .wrap{text-align:center; color:#fff; padding:24px;}
  .wrap h1{font-size:28px; margin-bottom:16px;}

  .spinner{
    width:32px; height:32px; border-radius:50%;
    border:3px solid rgba(255,255,255,.3); border-top-color:#fff;
    margin:0 auto 16px; animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #statusText{font-size:14px; opacity:.9; margin-bottom:28px;}

  .links{display:flex; gap:16px; justify-content:center; flex-wrap:wrap;}
  .links a{
    display:block; background:#fff; color:#1d4ed8; padding:18px 32px;
    border-radius:12px; text-decoration:none; font-weight:700; font-size:16px;
    box-shadow:0 6px 20px rgba(0,0,0,0.2); min-width:160px;
  }
  .links a small{display:block; font-weight:400; font-size:12px; color:#6b7280; margin-top:4px;}

  .manual-note{margin-top:24px; font-size:13px; opacity:.85;}
  .manual-note a{color:#fff; text-decoration:underline; cursor:pointer;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>📍 Sistem Absensi Karyawan</h1>

    <div id="status">
      <div class="spinner"></div>
      <div id="statusText">Mendeteksi perangkat...</div>
    </div>

    <div class="links" id="manualLinks" style="display:none;">
      <a href="./SISTEM_ABSENSI/KARYAWAN/KARYAWAN.html">📱 Aplikasi Karyawan<small>Absensi, Izin, Profile</small></a>
      <a href="./SISTEM_ABSENSI/ADMIN/ADMIN.html">🛠️ Admin Dashboard<small>Kelola & Approval</small></a>
    </div>

    <div class="manual-note">
      Salah arah? <a id="cancelBtn">Pilih manual di sini</a>
    </div>
  </div>

<script>
  var KARYAWAN_URL = './SISTEM_ABSENSI/KARYAWAN/KARYAWAN.html';
  var ADMIN_URL    = './SISTEM_ABSENSI/ADMIN/ADMIN.html';
  var REDIRECT_DELAY = 1200; // ms, beri jeda sebentar sebelum redirect otomatis

  function isMobileOrTablet() {
    var ua = navigator.userAgent || '';

    // HP & tablet Android / Windows Phone / dll
    if (/Android|iPhone|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua)) {
      return true;
    }
    // iPad versi lama (UA masih menyebut "iPad")
    if (/iPad/i.test(ua)) {
      return true;
    }
    // iPadOS 13+ Safari menyamar sebagai "Macintosh" di UA,
    // jadi dibedakan dari Mac asli lewat dukungan multi-touch
    if (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) {
      return true;
    }
    return false;
  }

  var mobile = isMobileOrTablet();
  var target = mobile ? KARYAWAN_URL : ADMIN_URL;
  var targetLabel = mobile ? 'Aplikasi Karyawan' : 'Admin Dashboard';

  document.getElementById('statusText').textContent = 'Mengarahkan ke ' + targetLabel + '...';

  var redirectTimer = setTimeout(function () {
    window.location.replace(target);
  }, REDIRECT_DELAY);

  document.getElementById('cancelBtn').addEventListener('click', function () {
    clearTimeout(redirectTimer);
    document.getElementById('status').style.display = 'none';
    document.getElementById('manualLinks').style.display = 'flex';
  });
</script>
</body>
</html>
